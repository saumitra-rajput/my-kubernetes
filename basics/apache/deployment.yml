# this is deployment file for apache

kind: Deployment
apiVersion: apps/v1
metadata:
  name: apache-dep  
  namespace: apache

spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
    
  template:
    metadata:
      name: apache-temp
      labels:
        app: apache
    spec:
      containers:
        - name: apache
          image: httpd:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 110Mi
            limits:
              cpu: 200m
              memory: 210Mi



