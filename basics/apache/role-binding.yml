# this is our role-binding file to bind service-account=apache-user to role=apache-manager


kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1 
metadata: 
  name: apache-manager-rolebinding
  namespace: apache

subjects:
- kind: User
  name: apache-user
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: apache-manager
  apiGroup: rbac.authorization.k8s.io

