# this is our HPA file for apache

kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: apache-hpa
  namespace: apache

spec: 
  scaleTargetRef:
    kind: Deployment
    name: apache-dep
    apiVersion: apps/v1
    
  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 3










