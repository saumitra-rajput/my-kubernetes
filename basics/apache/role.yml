# this is role manifest file for apache

kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: apache-manager
  namespace: apache

rules:
  - apiGroups: ["", "apps", "rbac.authorization.k8s.io", "batch"] #  * gets you everthing
    resources: [ "pods", "deployments", "services"]
    verbs: ["get", "apply", "watch", "create", "patch"] 

