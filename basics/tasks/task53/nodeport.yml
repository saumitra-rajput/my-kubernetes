# this service for node port

kind: Service
apiVersion: v1
metadata:
  name: nodeservice
  namespace: task

spec:
  type: NodePort
  selector:
    app: web-app
  ports:
    - port: 8081 # app will be live on 8081 if cluster Type is ClusterIP set
      targetPort: 80 # port of pods
      nodePort: 30080 # nodeport app will be live on 30080 as app is not open on all nodes port 30080

